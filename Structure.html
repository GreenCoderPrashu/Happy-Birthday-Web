<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Brithday</title>
    <link rel="stylesheet" href="Assets/Documents/Style.css">
    <link rel="icon" type="png" href="./Assets/Images/Logo.png">
</head>
<body>
    <div id="Welcome">
        <div class="Img">
            <img src="./Assets/Images/Logo.png" alt="PRASHU's Logo" class="Logo">
        </div>
        <h2 class="Hello">Hello Tom!!!</h2>
        <p>You Have Some Surprise... </p>
        <audio id="Song" src="./Assets/Audio/Song.mp3" style="display: none;" loop></audio>
        <button id="Btn" onclick="Show()">View Surprise...</button>
    </div>

    <div id="Wish-Container" style="display: none;">
        <p id="typing" class="Wish"></p>
        <button id="Tq-Btn" onclick="ShowPage1()" style="display: none;">Thank You...</button>
    </div>
    <div id="Page1" style="display: none;"> 
        <button id="Light-Btn" onclick="ShowPage2()" style="display: none;">Lights On...</button>
    </div>
    <div id="Page2" style="display: none;">
        <div class="Bulbs">
            <div class="Bulb-Container"> 
                <img src="Assets/Images/bulb.png" alt="" class="Png">
            </div>
            
            <div class="Bulb-Container"> 
                <img src="Assets/Images/bulb_blue.png" alt="" class="Png">
            </div>
            
            <div class="Bulb-Container"> 
                <img src="Assets/Images/bulb_green.png" alt="" class="Png">
            </div>
            
            <div class="Bulb-Container"> 
                <img src="Assets/bulb_orange.png" alt="" class="Png">
            </div>
            
            <div class="Bulb-Container"> 
                <img src="Assets/Images/bulb_green.png" alt="" class="Png">
            </div>
            
            <div class="Bulb-Container"> 
                <img src="Assets/Images/bulb_red.png" alt="" class="Png">
            </div>
            
            <div class="Bulb-Container"> 
                <img src="Assets/Images/bulb_yellow.png" alt="" class="Png">
            </div>
        </div>
        <button id="Let-Btn" onclick="ShowPage3(),ShowCake()" style="display: none;">Let Us Go...</button>
    </div>
</body>
<script src="Assets/Documents/Script.js"></script>
</html>
